<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>EAC Coastal</title>

<style>

body {
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial;
    background:#0f0f11;
    color:white;
    margin:0;
    padding:40px;
}


.container {
    max-width:1100px;
    margin:auto;
}


h1 {
    text-align:center;
}


.subtitle {
    text-align:center;
    color:#aaa;
    margin-bottom:30px;
}


.grid {

    display:grid;

    grid-template-columns:
        repeat(auto-fit,minmax(260px,1fr));

    gap:24px;

}


.card {

    background:#1c1c1f;

    border-radius:22px;

    padding:20px;

    text-align:center;

    cursor:pointer;

    border:1px solid #2d2d32;

    box-shadow:
        0 10px 30px rgba(0,0,0,.4);

    transition:.25s;

}


.card:hover {

    transform:translateY(-5px);

    background:#242428;

}


.card img {

    width:100%;

    height:160px;

    object-fit:cover;

    border-radius:16px;

}


.profile-image {

    width:120px !important;

    height:120px !important;

    border-radius:50% !important;

}


.card h2 {

    margin:15px 0 10px;

}


.card p {

    color:#bbb;

    line-height:1.5;

}


.lock {

    margin-left:8px;

}


button {

    background:#0a84ff;

    color:white;

    border:none;

    border-radius:12px;

    padding:12px 25px;

    cursor:pointer;

    font-size:16px;

}


input {

    background:#161618;

    color:white;

    border:1px solid #444;

    border-radius:12px;

    padding:12px;

    width:150px;

    text-align:center;

    font-size:22px;

    letter-spacing:8px;

}


.modal {

    background:#1c1c1f;

    border-radius:24px;

    padding:35px;

    text-align:center;

    box-shadow:
        0 20px 60px rgba(0,0,0,.6);

}


</style>

</head>


<body>


<div class="container">

<h1 id="title">
Who are you?
</h1>


<div id="content"></div>


</div>



<script>


const API =
"https://eac-coastaltrip-dev-ed.develop.my.site.com/app/services/apexrest/v1/viewer";


const HOMEPAGE_API =
"https://eac-coastaltrip-dev-ed.develop.my.site.com/app/services/apexrest/v1/homepage";


let viewer = null;
let pin = null;



async function api(url){

    console.log(url);

    let response = await fetch(url);


    if(!response.ok){

        throw new Error(await response.text());

    }


    return await response.json();

}




//==================================================
// Profiles
//==================================================


async function loadProfiles(){

    let data = await api(
        `${API}/getprofiles`
    );


    renderProfiles(data.profiles);

}



function renderProfiles(profiles){


    content.innerHTML = `

    <div class="grid">

    ${profiles.map(p=>`

        <div class="card"
             onclick="selectProfile(
                '${p.viewer_id}',
                ${p.has_pin},
                '${p.profile_name}',
                '${p.profile_picture}'
             )">


            <img class="profile-image"
                 src="${p.profile_picture}">


            <h2>

            ${p.profile_name}

            ${p.has_pin ? "🔒" : ""}

            </h2>


        </div>


    `).join("")}

    </div>

    `;


}




//==================================================
// Select Profile
//==================================================


function selectProfile(id,locked,name,image){


    viewer=id;


    if(locked){


        content.innerHTML = `

        <div class="modal">


            <img class="profile-image"
                 src="${image}">


            <h2>
            ${name} 🔒
            </h2>


            <p>
            Enter PIN
            </p>


            <input
                id="pin"
                type="password"
                maxlength="4"
                inputmode="numeric"
                oninput="
                this.value=this.value.replace(/[^0-9]/g,'')
                ">


            <br><br>


            <button onclick="verifyPin()">
                Unlock
            </button>


        </div>

        `;


    }

    else {

        pin=null;

        loadExperiences();

    }


}




//==================================================
// Verify PIN
//==================================================


async function verifyPin(){


    pin =
    document.getElementById("pin").value;


    if(pin.length !== 4){

        alert("PIN must be 4 digits.");

        return;

    }


    let result = await api(
        `${API}/verifypin?viewer=${viewer}&pin=${pin}`
    );


    if(result.success){

        loadExperiences();

    }

    else {

        alert(result.message);

    }


}




//==================================================
// Experiences
//==================================================


async function loadExperiences(){


    let url =
    `${API}/getexperiences?viewer=${viewer}`;


    if(pin){

        url += `&pin=${pin}`;

    }


    let data = await api(url);


    renderExperiences(data);

}




function renderExperiences(experiences){


    title.innerHTML =
    "Choose Experience";


    content.innerHTML = `

    <div class="grid">

    ${experiences.map(e=>`

        <div class="card"
             onclick="loadHomepage('${e.id}')">


            <h2>
            ${e.name}
            </h2>


            <p>
            ${e.description ?? ""}
            </p>


        </div>


    `).join("")}


    </div>

    `;


}




//==================================================
// Homepage
//==================================================


async function loadHomepage(experience){


    let url =
    `${HOMEPAGE_API}?viewer=${viewer}&experience=${experience}`;


    if(pin){

        url += `&pin=${pin}`;

    }


    let data = await api(url);


    renderHomepage(data);


}




function renderHomepage(data){


    title.innerHTML =
    data.title ?? "Homepage";


    content.innerHTML = `


    <div class="subtitle">

        ${data.description ?? ""}

    </div>


    <div class="grid">


    ${data.cards.map(card=>`

        <div class="card"
             onclick="openTarget('${card.target ?? ""}')">


            <img src="${card.image_url}">


            <h2>
            ${card.label}
            </h2>


            <p>
            ${card.description ?? ""}
            </p>


        </div>


    `).join("")}


    </div>


    `;


}




function openTarget(target){


    if(target){

        window.open(target,"_blank");

    }


}





loadProfiles();


</script>


</body>
</html>
